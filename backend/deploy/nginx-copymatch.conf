# Copy Match Checker backend — nginx reverse proxy (api.yourdomain.com -> serve.py:5500).
# Install to /etc/nginx/sites-available/copymatch, symlink into sites-enabled,
# then run certbot to add the TLS (443) block automatically:
#   sudo ln -s /etc/nginx/sites-available/copymatch /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.yourdomain.com
#
# Replace api.yourdomain.com with your real API subdomain. This host sits behind
# Cloudflare (proxied DNS) + Cloudflare Access, which handles user auth; this
# origin just terminates TLS and proxies to the local Python process.
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    # /ai/compare payloads (approved + page blocks) can be large.
    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # /render (Playwright) and /ai/compare (Claude) are slow; don't cut them off.
        proxy_connect_timeout 15s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}
