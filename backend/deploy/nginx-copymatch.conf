# Copy Match Checker — nginx (VPS-only, single host serves front + API).
# The VPS serves the static frontend AND proxies /api/* to serve.py, so the whole
# tool lives on one machine (no Cloudflare Pages). Install:
#   sudo cp nginx-copymatch.conf /etc/nginx/sites-available/copymatch
#   sudo ln -sf /etc/nginx/sites-available/copymatch /etc/nginx/sites-enabled/copymatch
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTP-only (no domain yet). To add HTTPS later, point a domain here and run
# `certbot --nginx -d yourdomain.com`. Access is currently open; add
# `auth_basic` here (htpasswd) or a firewall allowlist to restrict it.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # /ai/compare payloads (approved + page blocks) can be large.
    client_max_body_size 8m;

    # Static frontend (monorepo: /opt/copymatch/frontend).
    root /opt/copymatch/frontend;
    index index.html;

    # /api/* -> serve.py (strip the /api prefix; inject the shared secret so
    # serve.py's gate passes — the browser never sends it). The front calls
    # /api/render, /api/ai/compare, /api/ai/segment-pages (api-base = "/api").
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Proxy-Secret "REPLACE_WITH_PROXY_SECRET";
        proxy_set_header X-Real-IP $remote_addr;
        # /render (Playwright) and /ai/compare (Claude) are slow; don't cut them off.
        proxy_connect_timeout 15s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
